(function() {
    // ==================== IndexedDB 工具 ====================
    const DB_NAME = 'CardDiyDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'media';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveToDB(key, value) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(value, key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    async function loadFromDB(key) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.get(key);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function removeFromDB(key) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });

    // ---------- 拖拽缩放状态（像素单位）----------
    let translateX = 0;
    let translateY = 0;
    let scale = 1;
    let isDragging = false;
    let startX, startY, startTranslateX, startTranslateY;

    // 自定义 buff 状态
    let currentCustomBuff = null;

    // ==================== 卡图拖拽缩放 ====================
    function initImageControls() {
        if (!cardArtImg) return;

        cardArtImg.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDragging = true;
            cardArtImg.classList.add('dragging');
            startX = e.clientX;
            startY = e.clientY;
            startTranslateX = translateX;
            startTranslateY = translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            translateX = startTranslateX + (e.clientX - startX);
            translateY = startTranslateY + (e.clientY - startY);
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                cardArtImg.classList.remove('dragging');
            }
        });

        cardArtImg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.min(3, Math.max(0.3, scale + delta));
            updateTransform();
        });

        cardArtImg.addEventListener('dragstart', (e) => e.preventDefault());
    }

    function updateTransform() {
        if (!cardArtImg) return;
        cardArtImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetImageTransform() {
        translateX = 0; translateY = 0; scale = 1;
        updateTransform();
    }

    // ==================== 文本保存到 localStorage（不含图片）====================
    function saveTextData() {
        const data = {
            type: typeSelect.value,
            cost: costInput.value,
            effectTarget: effectSelect.value,
            cardName: inputCardName.innerText,
            cardDesc: inputCardDesc.innerText,
            appendix1: inputAppendix1.innerText,
            appendix2: inputAppendix2.innerText
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ==================== 数据加载 ====================
    async function loadAllData() {
        // 1. 从 localStorage 加载文本
        const savedText = localStorage.getItem(STORAGE_KEY);
        if (savedText) {
            try {
                const data = JSON.parse(savedText);
                typeSelect.value = data.type || 'Attack';
                costInput.value = data.cost || 2;
                effectSelect.value = data.effectTarget || 'none';
                inputCardName.innerText = data.cardName || '攻击(中)';
                inputCardDesc.innerText = data.cardDesc || '战斗中攻击方可用\n攻击力+1~3';
                inputAppendix1.innerText = data.appendix1 || 'CARD-001';
                inputAppendix2.innerText = data.appendix2 || '一切的恐惧源于火力不足';
            } catch (e) {
                console.warn('读取文本数据失败', e);
                setDefaultText();
            }
        } else {
            setDefaultText();
        }

        // 2. 从 IndexedDB 加载图片
        try {
            const savedArt = await loadFromDB('cardArt');
            if (savedArt && savedArt.dataURL) {
                cardArtImg.src = savedArt.dataURL;
                // 恢复变换状态
                if (savedArt.transform) {
                    translateX = savedArt.transform.translateX || 0;
                    translateY = savedArt.transform.translateY || 0;
                    scale = savedArt.transform.scale || 1;
                } else {
                    resetImageTransform();
                }
            } else {
                cardArtImg.src = IMAGES.defaultCardArt;
                resetImageTransform();
            }
        } catch (e) {
            console.warn('读取卡图失败', e);
            cardArtImg.src = IMAGES.defaultCardArt;
            resetImageTransform();
        }

        // 3. 从 IndexedDB 加载自定义 buff
        try {
            const buffData = await loadFromDB('customBuff');
            if (buffData && buffData.name && buffData.dataURL) {
                currentCustomBuff = buffData;
            } else {
                currentCustomBuff = null;
            }
        } catch (e) {
            currentCustomBuff = null;
        }
        updateBuffPreviewUI();

        toggleControlsByType();
        updateTypeVisuals();
        updateCostIcons();
        updateTexts();
    }

    function setDefaultText() {
        typeSelect.value = 'Attack';
        costInput.value = 2;
        effectSelect.value = 'none';
        inputCardName.innerText = '攻击(中)';
        inputCardDesc.innerText = '战斗中攻击方可用\n攻击力+1~3';
        inputAppendix1.innerText = 'CARD-001';
        inputAppendix2.innerText = '一切的恐惧源于火力不足';
    }

    // ==================== 重置 ====================
    async function resetToDefault() {
        localStorage.removeItem(STORAGE_KEY);
        await removeFromDB('cardArt');
        await removeFromDB('customBuff');
        setDefaultText();
        cardArtImg.src = IMAGES.defaultCardArt;
        resetImageTransform();
        currentCustomBuff = null;
        buffNameInput.value = '';
        updateBuffPreviewUI();
        toggleControlsByType();
        updateTypeVisuals();
        updateCostIcons();
        updateTexts();
    }

    // ==================== 费用 / 类型 ====================
    function updateCostIcons() {
        const type = typeSelect.value;
        const cost = parseInt(costInput.value, 10) || 1;
        const target = effectSelect.value;
        let html = '';

        if (type === 'Attack' || type === 'Defend') {
            const iconType = type === 'Attack' ? 'Attack' : 'Defend';
            for (let i = 0; i < cost; i++) {
                html += `<div class="Card00-box">
                    <img src="${IMAGES.card00.box}" width="32" height="32">
                    <div class="Card00"><img src="${IMAGES.card00[iconType]}" width="20" height="20"></div>
                </div>`;
            }
        } else if (type === 'Effect') {
            const effectImg = IMAGES.card00.Effect[target] || IMAGES.card00.Effect.none;
            html = `<div class="Card00-box"><img src="${effectImg}" style="width: 40px; height: auto;"></div>`;
        }
        costContainer.innerHTML = html;
        saveTextData();
    }

    function updateTypeVisuals() {
        const type = typeSelect.value;
        typeIconImg.src = IMAGES.card0[type] || IMAGES.card0.Attack;
        typeBarImg.src = IMAGES.card1[type] || IMAGES.card1.Attack;
        costContainer.classList.toggle('effect', type === 'Effect');
        saveTextData();
    }

    // ==================== Buff 解析 ====================
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    function parseDescription(text, buffMap) {
        if (!text) return '';
        let temp = text.replace(/&nbsp;/g, '{{nbsp}}').replace(/&emsp;/g, '{{emsp}}').replace(/&ensp;/g, '{{ensp}}');
        const buffRegex = /\{\{buff\|([^}]+)\}\}/g;
        let result = '';
        let lastIdx = 0, match;
        while ((match = buffRegex.exec(temp)) !== null) {
            result += escapeHtml(temp.substring(lastIdx, match.index));
            const iconUrl = buffMap[match[1]];
            result += iconUrl ? `<img src="${escapeHtml(iconUrl)}" style="width:26px;height:26px;vertical-align:-6px;display:inline-block;border-radius:4px;">` : `{{buff|${escapeHtml(match[1])}}}`;
            lastIdx = buffRegex.lastIndex;
        }
        result += escapeHtml(temp.substring(lastIdx));
        result = result.replace(/{{nbsp}}/g, '&nbsp;').replace(/{{emsp}}/g, '&emsp;').replace(/{{ensp}}/g, '&ensp;');
        return result.replace(/\n/g, '<br>');
    }

    function getFullBuffMap() {
        const map = { ...PRESET_BUFFS };
        if (currentCustomBuff?.name && currentCustomBuff?.dataURL) map[currentCustomBuff.name] = currentCustomBuff.dataURL;
        return map;
    }

    function updateTexts() {
        cardNameDisplay.innerText = inputCardName.innerText.trim() || '';
        cardDescDisplay.innerHTML = parseDescription(inputCardDesc.innerText, getFullBuffMap());
        appendix1Display.innerText = inputAppendix1.innerText.trim() || '';
        appendix2Display.innerText = inputAppendix2.innerText.trim() || '';
        saveTextData();
    }

    function toggleControlsByType() {
        const type = typeSelect.value;
        costControl.classList.toggle('hidden', type !== 'Attack' && type !== 'Defend');
        effectControl.classList.toggle('hidden', type !== 'Effect');
        saveTextData();
    }

    // ==================== Buff UI ====================
    function updateBuffPreviewUI() {
        if (currentCustomBuff?.name && currentCustomBuff?.dataURL) {
            currentBuffPreview.innerHTML = `当前自定义 Buff: ${escapeHtml(currentCustomBuff.name)} <img src="${escapeHtml(currentCustomBuff.dataURL)}" class="buff-preview-img">`;
            buffNameInput.value = currentCustomBuff.name;
        } else {
            currentBuffPreview.innerHTML = '当前自定义 Buff: 无';
            buffNameInput.value = '';
        }
    }

    async function uploadCustomBuff(file, buffName) {
        if (!buffName?.trim()) { alert('请输入 Buff 名称'); return; }
        const name = buffName.trim();
        if (PRESET_BUFFS.hasOwnProperty(name)) { alert(`"${name}" 是预设 Buff，不可覆盖。`); return; }
        if (!file?.type.startsWith('image/')) { alert('请选择有效的图片文件'); return; }
        const reader = new FileReader();
        reader.onload = async (e) => {
            currentCustomBuff = { name, dataURL: e.target.result };
            updateBuffPreviewUI();
            updateTexts();
            await saveToDB('customBuff', currentCustomBuff);
        };
        reader.readAsDataURL(file);
    }

    // ==================== 卡图上传 ====================
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file?.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            cardArtImg.src = ev.target.result;
            if (window._pendingTransform) {
                translateX = window._pendingTransform.translateX || 0;
                translateY = window._pendingTransform.translateY || 0;
                scale = window._pendingTransform.scale || 1;
                delete window._pendingTransform;
            } else {
                resetImageTransform();
            }
            updateTransform();
            // 保存到 IndexedDB（含变换状态）
            await saveToDB('cardArt', {
                dataURL: ev.target.result,
                transform: { translateX, translateY, scale }
            });
        };
        reader.readAsDataURL(file);
        fileInput.value = '';
    });

    // ==================== 事件绑定 ====================
    typeSelect.addEventListener('change', () => { toggleControlsByType(); updateTypeVisuals(); updateCostIcons(); });
    costInput.addEventListener('input', () => {
        let val = parseInt(costInput.value, 10);
        if (isNaN(val) || val < 1) costInput.value = 1;
        else if (val > 5) costInput.value = 5;
        updateCostIcons();
    });
    effectSelect.addEventListener('change', updateCostIcons);
    inputCardName.addEventListener('input', updateTexts);
    inputCardDesc.addEventListener('input', updateTexts);
    inputAppendix1.addEventListener('input', updateTexts);
    inputAppendix2.addEventListener('input', updateTexts);

    resetBtn.addEventListener('click', async () => {
        if (confirm('确定要重置所有内容吗？')) await resetToDefault();
    });

    uploadBuffBtn.addEventListener('click', () => {
        if (!buffNameInput.value.trim()) { alert('请先输入 Buff 名称'); return; }
        buffFileInput.click();
    });
    buffFileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) uploadCustomBuff(e.target.files[0], buffNameInput.value.trim());
        buffFileInput.value = '';
    });

    // ==================== 字体 ====================
    let fontLoadPromise = null;
    async function loadAndRegisterFonts() {
        if (fontLoadPromise) return fontLoadPromise;
        fontLoadPromise = (async () => {
            const cssUrl = 'https://fontsapi.zeoseven.com/298/main/result.css';
            const resp = await fetch(cssUrl);
            const cssText = await resp.text();
            const regex = /url\(['"]?(\.\/[^'"\)]+\.woff2)['"]?\)/g;
            const base = 'https://fontsapi.zeoseven.com/298/main/';
            const urls = [...new Set([...cssText.matchAll(regex)].map(m => base + m[1].slice(2)))];
            await Promise.all(urls.map(url => {
                const font = new FontFace('荆南波波黑', `url(${url})`, { weight: '700', style: 'normal' });
                return font.load().then(f => document.fonts.add(f)).catch(() => {});
            }));
            await document.fonts.ready;
        })();
        return fontLoadPromise;
    }
    loadAndRegisterFonts();

    // ==================== 截图 ====================
    saveBtn.addEventListener('click', async function() {
        if (confirm('是否导出数据？')) {
            const exportData = getExportData();
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.download = `${exportData.cardName || '卡牌'}.json`;
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
        }

        const btn = this;
        btn.innerText = '生成中...';
        btn.disabled = true;
        const preview = document.getElementById('character-card-preview');
        try {
            const imgs = [...preview.getElementsByTagName('img')];
            await Promise.all(imgs.map(img => img.complete && img.naturalHeight ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })));
            if (cardArtImg.src && cardArtImg.complete && cardArtImg.naturalWidth === 0) {
                await new Promise(r => { cardArtImg.onload = r; cardArtImg.onerror = r; });
            }
            await loadAndRegisterFonts();
            await document.fonts.ready;
            preview.offsetHeight;
            const dataUrl = await window.modernScreenshot.domToPng(preview, {
                scale: Math.min(4, Math.max(2, (devicePixelRatio || 1) * 1.5)),
                backgroundColor: null,
                width: 362, height: 530,
                style: { overflow: 'visible' }
            });
            const link = document.createElement('a');
            const typeMap = { Attack:'攻击卡', Defend:'防御卡', Effect:'效果卡', Counter:'反制卡', ji:'好运卡', xiong:'霉运卡', Event:'事件卡', curse:'诅咒卡' };
            const cardName = (inputCardName.innerText.trim() || '未命名').replace(/[\\/:*?"<>|\r\n]/g, '_');
            link.download = `卡片_${typeMap[typeSelect.value] || typeSelect.value}_${cardName}.png`;
            link.href = dataUrl;
            link.click();
        } catch (err) {
            alert('截图失败：' + err.message);
        } finally {
            btn.innerText = '保存图片';
            btn.disabled = false;
        }
    });

    // ==================== 导出 / 导入 ====================
    function getExportData() {
        return {
            version: 1,
            type: typeSelect.value,
            cost: parseInt(costInput.value, 10) || 1,
            effectTarget: effectSelect.value,
            cardName: inputCardName.innerText.trim(),
            cardDesc: inputCardDesc.innerText.trim(),
            appendix1: inputAppendix1.innerText.trim(),
            appendix2: inputAppendix2.innerText.trim(),
            transform: { translateX, translateY, scale }
        };
    }

    document.getElementById('export-json-btn').addEventListener('click', () => {
        const data = getExportData();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.download = `${data.cardName || '卡牌'}.json`;
        a.href = URL.createObjectURL(blob);
        a.click();
        URL.revokeObjectURL(a.href);
    });

    const importFileInput = document.getElementById('import-file-input');
    document.getElementById('import-json-btn').addEventListener('click', () => importFileInput.click());

    importFileInput.addEventListener('change', async () => {
        const file = importFileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            let data;
            try {
                data = JSON.parse(e.target.result);
                if (!data.type || data.cardName === undefined) throw new Error('缺少必要字段');
            } catch (err) {
                alert('导入失败：' + err.message);
                importFileInput.value = '';
                return;
            }
            typeSelect.value = data.type || 'Attack';
            costInput.value = data.cost || 2;
            effectSelect.value = data.effectTarget || 'none';
            inputCardName.innerText = data.cardName || '';
            inputCardDesc.innerText = data.cardDesc || '';
            inputAppendix1.innerText = data.appendix1 || '';
            inputAppendix2.innerText = data.appendix2 || '';
            if (data.transform) {
                translateX = data.transform.translateX || 0;
                translateY = data.transform.translateY || 0;
                scale = data.transform.scale || 1;
                updateTransform();
            }
            toggleControlsByType();
            updateTypeVisuals();
            updateCostIcons();
            updateTexts();

            if (confirm('数据已加载。是否更换卡图？')) {
                window._pendingTransform = { translateX, translateY, scale };
                fileInput.click();
            }
            importFileInput.value = '';
        };
        reader.readAsText(file);
    });

    // ==================== 启动 ====================
    initImageControls();
    loadAllData();
})();
</script>
<script src="/js/nav.js"></script>
<script src="/js/update-log.js" data-log-url="card-diy-update-log.json"></script>
